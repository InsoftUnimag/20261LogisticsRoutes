# =============================================================================
# Entorno de desarrollo local — Sistema de Gestión de Rutas Logísticas
#
# Servicios incluidos:
#   - postgres : PostgreSQL 17 (BD principal)
#   - redis    : Redis 7       (ShedLock + caché)
#
# Arrancar:  docker compose up -d
# Detener:   docker compose down
# Logs:      docker compose logs -f
# =============================================================================

services:

  postgres:
    image: postgres:17-alpine
    container_name: logistics-routes-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logistics-routes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
