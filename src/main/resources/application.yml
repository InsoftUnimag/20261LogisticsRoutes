spring:
  application:
    name: logistics-routes
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    validate-on-migrate: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# Actuator (health + info únicamente)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Propiedades de la aplicación
app:
  jwt:
    expiration-ms: 86400000   # 24h por defecto; sobreescribible por perfil
  sqs:
    solicitudes-ruta-queue: solicitudes-ruta-queue
    eventos-paquete-queue: eventos-paquete-queue
    cierre-ruta-queue: cierre-ruta-queue

# Formato de logs con contexto MDC de trazabilidad
# Variables disponibles: %X{request_id} %X{ruta_id} %X{conductor_id} %X{user_email}
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [req:%X{request_id}] [ruta:%X{ruta_id}] [cond:%X{conductor_id}] %logger{30} - %msg%n"
  level:
    com.logistics.routes: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
