# ─── Perfil DEV ────────────────────────────────────────────────────────────────
# Apunta al PostgreSQL y Redis del docker-compose.yml local.
# Credenciales leídas desde .env (nunca hardcodeadas).
# Requiere: docker compose up -d

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:logistics_routes_dev}
    username: ${DB_USER:logistics_user}
    password: ${DB_PASSWORD:logistics_dev_pwd}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway es la única fuente de verdad — nunca update/create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Spring Cloud AWS — apunta a LocalStack
spring.cloud.aws:
  credentials:
    access-key: test
    secret-key: test
  region:
    static: us-east-1
  sqs:
    endpoint: http://localhost:4566

app:
  jwt:
    secret: dev-secret-key-32-chars-minimum-padding-ok
    expiration-ms: 86400000

logging:
  level:
    com.logistics.routes: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    io.awspring.cloud: DEBUG
