# ─── Perfil DEV ────────────────────────────────────────────────────────────────
# Apunta a PostgreSQL local y LocalStack para SQS.
# Requiere: Docker con postgres:15 y localstack/localstack corriendo.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/logistics_routes_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      # sin password en dev local

# Spring Cloud AWS — apunta a LocalStack
spring.cloud.aws:
  credentials:
    access-key: test
    secret-key: test
  region:
    static: us-east-1
  sqs:
    endpoint: http://localhost:4566

app:
  jwt:
    secret: dev-secret-key-32-chars-minimum-padding-ok
    expiration-ms: 86400000

logging:
  level:
    com.logistics.routes: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    io.awspring.cloud: DEBUG
